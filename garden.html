<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinator Garden | Creative Lab</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 85vh;
            padding: 20px;
        }
        canvas {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            border: 2px solid #f2f7f4;
            cursor: none; /* Hide default cursor so the bee IS the cursor */
            touch-action: none; 
        }
        .instructions {
            margin-top: 1rem;
            color: #4a4a4a;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="game-wrapper">
        <a href="index.html" class="link" style="align-self: flex-start; margin-bottom: 1rem; max-width: 600px; width: 100%;">← Back to Portfolio</a>
        <canvas id="gardenCanvas" width="600" height="400"></canvas>
        <p class="instructions">Guide the bee to wake up the garden.</p>
    </main>

    <script>
    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d');

    const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    
    // --- The Bee ---
    class Bee {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.size = 8;
            this.easing = 0.05; 
        }

        update() {
            this.x += (mouse.x - this.x) * this.easing;
            this.y += (mouse.y - this.y) * this.easing;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            const dx = mouse.x - this.x;
            ctx.rotate(dx * 0.005);

            // Body
            ctx.fillStyle = '#feca57'; 
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size + 4, this.size, 0, 0, Math.PI * 2);
            ctx.fill();

            // Stripes
            ctx.fillStyle = '#3a3f3a';
            ctx.fillRect(-2, -this.size, 4, this.size * 2);

            // Wings
            const flap = Math.sin(Date.now() * 0.05) * 3;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.ellipse(-2, -this.size, 4, 6 + flap, Math.PI / 4, 0, Math.PI * 2);
            ctx.ellipse(2, -this.size, 4, 6 + flap, -Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }
    }

    // --- The Native Flora ---
    class NativeFlower {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = 30 + Math.random() * (canvas.width - 60);
            this.y = 30 + Math.random() * (canvas.height - 60);
            this.state = 'bud';
            this.bloomScale = 0;
            
            // Assign a random native species
            const species = ['susan', 'coneflower', 'aster'];
            this.type = species[Math.floor(Math.random() * species.length)];
        }

        draw() {
            if (this.state === 'bud') {
                ctx.fillStyle = '#badc58';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (this.state === 'bloom') {
                if (this.bloomScale < 1) this.bloomScale += 0.05;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.bloomScale, this.bloomScale);

                // Specific drawing logic per species
                if (this.type === 'susan') {
                    // Black-eyed Susan (Golden petals, dark center)
                    ctx.fillStyle = '#f1c40f';
                    for (let i = 0; i < 12; i++) {
                        ctx.rotate((Math.PI * 2) / 12);
                        ctx.beginPath();
                        ctx.ellipse(10, 0, 8, 3, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#2d3436';
                    ctx.beginPath();
                    ctx.arc(0, 0, 6, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (this.type === 'coneflower') {
                    // Pale Purple Coneflower (Drooping pink/purple petals, spiky orange center)
                    ctx.fillStyle = '#D980FA';
                    for (let i = 0; i < 10; i++) {
                        ctx.rotate((Math.PI * 2) / 10);
                        ctx.beginPath();
                        ctx.ellipse(12, 4, 10, 3, Math.PI / 8, 0, Math.PI * 2); // Angled down
                        ctx.fill();
                    }
                    ctx.fillStyle = '#e67e22';
                    ctx.beginPath();
                    ctx.arc(0, 0, 7, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (this.type === 'aster') {
                    // New England Aster (Many thin purple petals, yellow center)
                    ctx.fillStyle = '#9b59b6';
                    for (let i = 0; i < 20; i++) {
                        ctx.rotate((Math.PI * 2) / 20);
                        ctx.beginPath();
                        ctx.ellipse(10, 0, 9, 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }
    }

    // --- Game Initialization & Loop ---

    const bee = new Bee();
    const garden = [];
    let resetTimer = null;

    for (let i = 0; i < 20; i++) {
        garden.push(new NativeFlower());
    }

    function updateMouse(e) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX || e.touches[0].clientX) - rect.left;
        mouse.y = (e.clientY || e.touches[0].clientY) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let bloomedCount = 0;

        garden.forEach(flower => {
            if (flower.state === 'bud') {
                const dist = Math.hypot(bee.x - flower.x, bee.y - flower.y);
                if (dist < 30) flower.state = 'bloom';
            } else {
                bloomedCount++;
            }
            flower.draw();
        });

        // The Reset Logic (Phase 2)
        if (bloomedCount === garden.length && !resetTimer) {
            // Wait 4 seconds to admire the garden, then reset
            resetTimer = setTimeout(() => {
                garden.forEach(flower => flower.reset());
                resetTimer = null;
            }, 4000);
        }

        bee.update();
        bee.draw();

        requestAnimationFrame(animate);
    }

    animate();
</script>
