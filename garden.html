<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinator Garden | Creative Lab</title>
    <link rel="stylesheet" href="css/style.css">
<style>
    .game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 85vh;
        padding: 20px;
    }
    canvas {
        background-color: #fcfbf9; /* Default Morning */
        transition: background-color 4s ease-in-out; /* Smooth time-of-day transitions */
        border-radius: 32px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.04);
        border: 2px solid rgba(0,0,0,0.05);
        cursor: none; 
        touch-action: none; 
    }
    .instructions {
        margin-top: 1rem;
        color: #4a4a4a;
        font-size: 0.9rem;
        font-weight: bold;
        text-align: center;
        transition: color 4s ease;
    }
</style>
</head>
<body>
    <main class="game-wrapper">
        <a href="index.html" class="link" style="align-self: flex-start; margin-bottom: 1rem; max-width: 600px; width: 100%;">← Back to Portfolio</a>
        <canvas id="gardenCanvas" width="600" height="400"></canvas>
        <p class="instructions">Guide the bee to wake up the garden.</p>
    </main>

    <script>
    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d');
    const instructions = document.querySelector('.instructions');

    const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let cycle = 0; 
    
    // --- The Landscape Engine (New Prairie Field) ---
    const grassBlades = [];
    for (let i = 0; i < 70; i++) {
        grassBlades.push({
            x: Math.random() * canvas.width,
            height: 20 + Math.random() * 40,
            swaySpeed: 0.001 + Math.random() * 0.001,
            swayOffset: Math.random() * Math.PI * 2
        });
    }

    // Color interpolation for smooth time-of-day transitions
    let currentGroundColor = { r: 218, g: 235, b: 211 }; // Morning soft green
    let targetGroundColor = { r: 218, g: 235, b: 211 };

    function updateLandscapeColor() {
        // Smoothly shift the current color toward the target color (Lerp)
        currentGroundColor.r += (targetGroundColor.r - currentGroundColor.r) * 0.02;
        currentGroundColor.g += (targetGroundColor.g - currentGroundColor.g) * 0.02;
        currentGroundColor.b += (targetGroundColor.b - currentGroundColor.b) * 0.02;
        
        const r = Math.round(currentGroundColor.r);
        const g = Math.round(currentGroundColor.g);
        const b = Math.round(currentGroundColor.b);
        return { solid: `rgb(${r}, ${g}, ${b})`, semi: `rgba(${r}, ${g}, ${b}, 0.5)` };
    }

    function drawPrairie() {
        const colors = updateLandscapeColor();

        // 1. Draw distant rolling hill
        ctx.fillStyle = colors.semi;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);
        ctx.bezierCurveTo(canvas.width * 0.3, canvas.height * 0.5, canvas.width * 0.7, canvas.height * 0.8, canvas.width, canvas.height * 0.4);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.fill();

        // 2. Draw gently swaying foreground grass
        ctx.strokeStyle = colors.solid;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        grassBlades.forEach(blade => {
            // Trigonometry creates the calming, rhythmic wind effect
            const sway = Math.sin(Date.now() * blade.swaySpeed + blade.swayOffset) * 15;
            ctx.beginPath();
            ctx.moveTo(blade.x, canvas.height);
            ctx.quadraticCurveTo(blade.x + sway / 2, canvas.height - blade.height / 2, blade.x + sway, canvas.height - blade.height);
            ctx.stroke();
        });
    }

    // --- The Pollinator (Bee or Luna Moth) ---
    class Pollinator {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.easing = 0.04; 
        }

        update() {
            this.x += (mouse.x - this.x) * this.easing;
            this.y += (mouse.y - this.y) * this.easing;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            const dx = mouse.x - this.x;
            ctx.rotate(dx * 0.005);

            if (cycle < 2) {
                // Draw Bee
                ctx.fillStyle = '#feca57'; 
                ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#3a3f3a'; ctx.fillRect(-2, -8, 4, 16);
                const flap = Math.sin(Date.now() * 0.05) * 3;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath(); ctx.ellipse(-2, -8, 4, 6 + flap, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(2, -8, 4, 6 + flap, -Math.PI / 4, 0, Math.PI * 2); ctx.fill();
            } else {
                // Draw Luna Moth
                const flap = Math.sin(Date.now() * 0.03) * 5; 
                ctx.fillStyle = '#fdfcf0'; 
                ctx.beginPath(); ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(186, 220, 88, 0.85)'; 
                ctx.beginPath(); ctx.ellipse(-8, -2, 12, 16 + flap, Math.PI / 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(8, -2, 12, 16 + flap, -Math.PI / 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-6, 10, 8, 18 - flap, -Math.PI / 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(6, 10, 8, 18 - flap, Math.PI / 8, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }
    }

    // --- Ambient Fireflies (Night Only) ---
    class Firefly {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.offset = Math.random() * 100;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            const glow = (Math.sin(Date.now() * 0.002 + this.offset) + 1) / 2;
            ctx.fillStyle = `rgba(241, 196, 15, ${glow * 0.8})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2 + glow * 2, 0, Math.PI * 2); ctx.fill();
        }
    }

    // --- The Native Flora ---
    class NativeFlower {
        constructor() { this.reset(); }
        reset() {
            this.x = 30 + Math.random() * (canvas.width - 60);
            // Keep flowers roughly in the prairie field area
            this.y = (canvas.height * 0.4) + Math.random() * (canvas.height * 0.5);
            this.state = 'bud';
            this.bloomScale = 0;
            const species = ['susan', 'coneflower', 'aster'];
            this.type = species[Math.floor(Math.random() * species.length)];
        }
        draw() {
            if (this.state === 'bud') {
                ctx.fillStyle = cycle < 2 ? '#badc58' : '#5f6e46';
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
            } else if (this.state === 'bloom') {
                if (this.bloomScale < 1) this.bloomScale += 0.03;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.bloomScale, this.bloomScale);

                if (this.type === 'susan') {
                    ctx.fillStyle = cycle < 2 ? '#f1c40f' : '#b08f0a'; 
                    for (let i = 0; i < 12; i++) {
                        ctx.rotate((Math.PI * 2) / 12);
                        ctx.beginPath(); ctx.ellipse(10, 0, 8, 3, 0, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = '#2d3436'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
                } 
                else if (this.type === 'coneflower') {
                    ctx.fillStyle = cycle < 2 ? '#D980FA' : '#8e54a3';
                    for (let i = 0; i < 10; i++) {
                        ctx.rotate((Math.PI * 2) / 10);
                        ctx.beginPath(); ctx.ellipse(12, 4, 10, 3, Math.PI / 8, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
                } 
                else if (this.type === 'aster') {
                    ctx.fillStyle = cycle < 2 ? '#9b59b6' : '#643975';
                    for (let i = 0; i < 20; i++) {
                        ctx.rotate((Math.PI * 2) / 20);
                        ctx.beginPath(); ctx.ellipse(10, 0, 9, 2, 0, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }
    }

    // --- Game Initialization & Loop ---
    const pollinator = new Pollinator();
    const garden = [];
    const fireflies = [];
    let resetTimer = null;

    for (let i = 0; i < 20; i++) garden.push(new NativeFlower());
    for (let i = 0; i < 15; i++) fireflies.push(new Firefly()); 

    function updateMouse(e) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX || e.touches[0].clientX) - rect.left;
        mouse.y = (e.clientY || e.touches[0].clientY) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); });

    function advanceTimeOfDay() {
        cycle++;
        if (cycle === 1) {
            canvas.style.backgroundColor = '#fff3e0'; // Golden Hour Sky
            targetGroundColor = { r: 232, g: 213, b: 181 }; // Warm wheat grass
            instructions.innerText = "The afternoon sun brings out new blooms.";
        } else if (cycle === 2) {
            canvas.style.backgroundColor = '#2c3e50'; // Dusk Sky
            targetGroundColor = { r: 26, g: 37, b: 47 }; // Dark night silhouettes
            instructions.style.color = '#fcfbf9'; 
            instructions.innerText = "The Luna Moth takes the night shift.";
        } else if (cycle > 2) {
            instructions.innerText = "The ecosystem is at rest. Thanks for visiting.";
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. Draw Background Prairie
        drawPrairie();

        let bloomedCount = 0;

        // 2. Draw Fireflies (Night Only)
        if (cycle >= 2) {
            fireflies.forEach(f => { f.update(); f.draw(); });
        }

        // 3. Draw Garden
        garden.forEach(flower => {
            if (flower.state === 'bud' && cycle <= 2) {
                const dist = Math.hypot(pollinator.x - flower.x, pollinator.y - flower.y);
                if (dist < 30) flower.state = 'bloom';
            } else if (flower.state === 'bloom') {
                bloomedCount++;
            }
            flower.draw();
        });

        // Time Progression Logic
        if (bloomedCount === garden.length && !resetTimer && cycle <= 2) {
            resetTimer = setTimeout(() => {
                advanceTimeOfDay();
                if (cycle <= 2) {
                    garden.forEach(flower => flower.reset());
                }
                resetTimer = null;
            }, 5000); 
        }

        // 4. Draw Pollinator on top
        pollinator.update();
        pollinator.draw();

        requestAnimationFrame(animate);
    }

    animate();
</script>
