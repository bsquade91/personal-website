<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinator Garden | Creative Lab</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 85vh;
            padding: 20px;
        }
        canvas {
            background-color: #fcfbf9;
            transition: background-color 4s ease-in-out; 
            border-radius: 32px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            border: 2px solid rgba(0,0,0,0.05);
            cursor: none; 
            touch-action: none; 
        }
        .instructions {
            margin-top: 1rem;
            color: #4a4a4a;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            transition: color 4s ease;
        }
    </style>
</head>
<body>
    <main class="game-wrapper">
        <a href="index.html" class="link" style="align-self: flex-start; margin-bottom: 1rem; max-width: 600px; width: 100%;">← Back to Portfolio</a>
        <canvas id="gardenCanvas" width="600" height="400"></canvas>
        <p class="instructions">Guide the bee to wake up the garden.</p>
    </main>

<script>
    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d');
    const instructions = document.querySelector('.instructions');

    const TWO_PI = Math.PI * 2;
    const PI = Math.PI;

    let horizonY = canvas.height * 0.45; 
    const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    
    // 0: Spring, 1: Summer, 2: Fall, 3: Night, 4: Thank You, 5: Winter
    let cycle = 0; 
    
    const grassBlades = [];
    for (let i = 0; i < 80; i++) {
        grassBlades.push({
            x: Math.random() * canvas.width,
            y: horizonY + Math.random() * (canvas.height - horizonY),
            height: 15 + Math.random() * 25,
            swaySpeed: 0.001 + Math.random() * 0.001,
            swayOffset: Math.random() * TWO_PI
        });
    }

    const palettes = {
        spring: {
            skyTop: [210, 235, 255],     
            skyBottom: [245, 250, 245],  
            hillDistant: [180, 210, 190],
            hillNear: [160, 200, 170],
            field: [190, 225, 185],      
            grass: [140, 190, 140]
        },
        summer: {
            skyTop: [100, 180, 240],     
            skyBottom: [200, 230, 250],
            hillDistant: [140, 190, 150],
            hillNear: [120, 170, 130],
            field: [150, 200, 140],      
            grass: [100, 160, 100]
        },
        fall: {
            skyTop: [255, 210, 150],     
            skyBottom: [255, 180, 120],  
            hillDistant: [220, 180, 140],
            hillNear: [200, 160, 120],
            field: [230, 190, 140],      
            grass: [180, 140, 100]
        },
        night: {
            skyTop: [44, 62, 80],        
            skyBottom: [232, 126, 120],  
            hillDistant: [52, 73, 94],
            hillNear: [44, 62, 80],
            field: [26, 37, 47],         
            grass: [44, 62, 80]
        },
        winter: {
            skyTop: [160, 180, 200],     
            skyBottom: [220, 230, 240],  
            hillDistant: [210, 220, 230],
            hillNear: [230, 240, 250],
            field: [240, 245, 250],      
            grass: [200, 210, 220]
        }
    };

    let currentPalette = { ...palettes.spring };
    let targetPalette = { ...palettes.spring };

    function lerpColor(current, target, speed) {
        current[0] += (target[0] - current[0]) * speed;
        current[1] += (target[1] - current[1]) * speed;
        current[2] += (target[2] - current[2]) * speed;
        return `rgb(${Math.round(current[0])}, ${Math.round(current[1])}, ${Math.round(current[2])})`;
    }

    function drawScene() {
        const speed = 0.02;
        const colors = {};
        for (const key in currentPalette) {
            colors[key] = lerpColor(currentPalette[key], targetPalette[key], speed);
        }
        
        const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
        skyGrad.addColorStop(0, colors.skyTop);
        skyGrad.addColorStop(1, colors.skyBottom);
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, horizonY);

        ctx.fillStyle = colors.hillDistant;
        ctx.beginPath();
        ctx.moveTo(0, horizonY);
        ctx.bezierCurveTo(canvas.width * 0.5, horizonY - 30, canvas.width * 0.8, horizonY - 10, canvas.width, horizonY - 20);
        ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.fill();

        ctx.fillStyle = colors.field;
        ctx.beginPath();
        ctx.moveTo(0, horizonY + 10);
        ctx.bezierCurveTo(canvas.width * 0.2, horizonY - 5, canvas.width * 0.6, horizonY + 25, canvas.width, horizonY + 5);
        ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.fill();

        ctx.strokeStyle = colors.grass;
        ctx.lineWidth = 2; ctx.lineCap = 'round';
        grassBlades.forEach(blade => {
            const sway = Math.sin(Date.now() * blade.swaySpeed + blade.swayOffset) * 10;
            ctx.beginPath();
            ctx.moveTo(blade.x, blade.y);
            ctx.quadraticCurveTo(blade.x + sway / 2, blade.y - blade.height / 2, blade.x + sway, blade.y - blade.height);
            ctx.stroke();
        });
    }

    class Pollinator {
        constructor() { this.x = canvas.width/2; this.y = canvas.height/2; this.easing = 0.04; }
        update() {
            this.x += (mouse.x - this.x) * this.easing;
            this.y += (mouse.y - this.y) * this.easing;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate((mouse.x - this.x) * 0.005);

            if (cycle < 3) {
                ctx.fillStyle = '#feca57'; ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, TWO_PI); ctx.fill();
                ctx.fillStyle = '#3a3f3a'; ctx.fillRect(-2, -8, 4, 16);
                const flap = Math.sin(Date.now() * 0.05) * 3;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath(); ctx.ellipse(-2, -8, 4, 6 + flap, PI / 4, 0, TWO_PI); ctx.fill();
                ctx.beginPath(); ctx.ellipse(2, -8, 4, 6 + flap, -PI / 4, 0, TWO_PI); ctx.fill();
            } else {
                const flap = Math.sin(Date.now() * 0.03) * 5; 
                ctx.fillStyle = '#fdfcf0'; ctx.beginPath(); ctx.ellipse(0, 0, 6, 12, 0, 0, TWO_PI); ctx.fill();
                ctx.fillStyle = 'rgba(186, 220, 88, 0.85)'; 
                ctx.beginPath(); ctx.ellipse(-8, -2, 12, 16 + flap, PI / 6, 0, TWO_PI); ctx.fill();
                ctx.beginPath(); ctx.ellipse(8, -2, 12, 16 + flap, -PI / 6, 0, TWO_PI); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-6, 10, 8, 18 - flap, -PI / 8, 0, TWO_PI); ctx.fill();
                ctx.beginPath(); ctx.ellipse(6, 10, 8, 18 - flap, PI / 8, 0, TWO_PI); ctx.fill();
            }
            ctx.restore();
        }
    }

    class Firefly {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
            this.offset = Math.random() * 100;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            const glow = (Math.sin(Date.now() * 0.002 + this.offset) + 1) / 2;
            ctx.fillStyle = `rgba(241, 196, 15, ${glow * 0.8})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2 + glow * 2, 0, TWO_PI); ctx.fill();
        }
    }

    // --- Snow Particles for Winter ---
    class Snowflake {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = 0.5 + Math.random() * 1.5;
            this.size = 1 + Math.random() * 2;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.y > canvas.height) {
                this.y = -5;
                this.x = Math.random() * canvas.width;
            }
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, 0.8)`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, TWO_PI); ctx.fill();
        }
    }

    class NativeFlower {
        constructor() { this.reset(); }
        reset() {
            this.x = 20 + Math.random() * (canvas.width - 40);
            this.y = horizonY + 20 + Math.random() * (canvas.height - horizonY - 40);
            this.state = 'bud';
            this.bloomScale = 0;
            
            const springSpecies = ['bluebell', 'columbine', 'verbena'];
            const summerSpecies = ['susan', 'coneflower', 'butterflyweed'];
            const fallSpecies = ['aster', 'goldenrod', 'cardinal'];
            const nightSpecies = ['moonflower', 'primrose', 'yucca'];

            if (cycle === 0) this.type = springSpecies[Math.floor(Math.random() * 3)];
            else if (cycle === 1) this.type = summerSpecies[Math.floor(Math.random() * 3)];
            else if (cycle === 2) this.type = fallSpecies[Math.floor(Math.random() * 3)];
            else if (cycle === 3) this.type = nightSpecies[Math.floor(Math.random() * 3)];
        }
        
        draw() {
            if (this.state === 'bud') {
                ctx.fillStyle = cycle < 3 ? 'rgba(186, 220, 88, 0.85)' : 'rgba(95, 110, 70, 0.85)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 4.5, 0, TWO_PI); ctx.fill();
            } else if (this.state === 'bloom') {
                // Increased max size to 1.7 for bigger flowers
                if (this.bloomScale < 1.7) this.bloomScale += 0.03; 
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.bloomScale, this.bloomScale);
                
                // Softens the colors to align better with the soft landscape background
                ctx.globalAlpha = 0.85; 

                if (this.type === 'bluebell') {
                    ctx.fillStyle = '#74b9ff';
                    const drawBell = (bx, by, rot) => {
                        ctx.save(); ctx.translate(bx, by); ctx.rotate(rot);
                        ctx.beginPath(); ctx.moveTo(0, -4);
                        ctx.quadraticCurveTo(4, 0, 5, 4); ctx.lineTo(-5, 4);
                        ctx.quadraticCurveTo(-4, 0, 0, -4); ctx.fill();
                        ctx.restore();
                    }
                    drawBell(-6, 2, PI/6); drawBell(0, 0, 0); drawBell(6, 2, -PI/6);
                } else if (this.type === 'columbine') {
                    ctx.fillStyle = '#e74c3c';
                    for(let i=0; i<5; i++){ ctx.rotate(TWO_PI/5); ctx.beginPath(); ctx.ellipse(0, 6, 3, 8, 0, 0, TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0,0,4,0,TWO_PI); ctx.fill();
                } else if (this.type === 'verbena') {
                    ctx.fillStyle = '#fd79a8';
                    for(let i=0; i<5; i++) { ctx.rotate(TWO_PI/5); ctx.beginPath(); ctx.arc(4, 0, 4, 0, TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#e84393'; ctx.beginPath(); ctx.arc(0,0,3,0,TWO_PI); ctx.fill();
                }
                else if (this.type === 'susan') {
                    ctx.fillStyle = '#f1c40f';
                    for(let i=0; i<12; i++){ ctx.rotate(TWO_PI/12); ctx.beginPath(); ctx.ellipse(10,0,8,3,0,0,TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#2d3436'; ctx.beginPath(); ctx.arc(0,0,6,0,TWO_PI); ctx.fill();
                } else if (this.type === 'coneflower') {
                    ctx.fillStyle = '#D980FA';
                    for(let i=0; i<10; i++){ ctx.rotate(TWO_PI/10); ctx.beginPath(); ctx.ellipse(12,4,10,3,PI/8,0,TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(0,0,7,0,TWO_PI); ctx.fill();
                } else if (this.type === 'butterflyweed') {
                    ctx.fillStyle = '#e67e22';
                    const petals = [[0,-4], [5,-2], [3,4], [-3,4], [-5,-2], [0,0], [4,-6], [-4,-6]];
                    petals.forEach(([px, py]) => { ctx.beginPath(); ctx.arc(px, py, 3, 0, TWO_PI); ctx.fill(); });
                }
                else if (this.type === 'aster') {
                    ctx.fillStyle = '#9b59b6';
                    for(let i=0; i<20; i++){ ctx.rotate(TWO_PI/20); ctx.beginPath(); ctx.ellipse(10,0,9,2,0,0,TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0,0,5,0,TWO_PI); ctx.fill();
                } else if (this.type === 'goldenrod') {
                    ctx.fillStyle = '#2ecc71'; ctx.fillRect(-1, 0, 2, 16);
                    ctx.fillStyle = '#f1c40f';
                    const yellowDots = [[0,2], [2,5], [-2,6], [4,9], [-3,10], [1,13], [-1,15], [3,17], [-2,18]];
                    yellowDots.forEach(([px, py]) => { ctx.beginPath(); ctx.arc(px, py, 2.5, 0, TWO_PI); ctx.fill(); });
                } else if (this.type === 'cardinal') {
                    ctx.fillStyle = '#2ecc71'; ctx.fillRect(-1, 0, 2, 20); 
                    ctx.fillStyle = '#e74c3c';
                    for(let i=0; i<4; i++) {
                        let y = 4 + i*4;
                        ctx.beginPath(); ctx.ellipse(-3, y, 4, 1.5, -PI/4, 0, TWO_PI); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(3, y, 4, 1.5, PI/4, 0, TWO_PI); ctx.fill();
                        ctx.beginPath(); ctx.arc(0, y-1, 2, 0, TWO_PI); ctx.fill();
                    }
                }
                else if (this.type === 'moonflower') {
                    ctx.fillStyle = '#ffffff';
                    for(let i=0; i<5; i++){ ctx.rotate(TWO_PI/5); ctx.beginPath(); ctx.arc(6, 0, 8, 0, TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#eafaf1'; ctx.beginPath(); ctx.arc(0,0,4,0,TWO_PI); ctx.fill();
                } else if (this.type === 'primrose') {
                    ctx.fillStyle = '#fef9e7';
                    for(let i=0; i<4; i++){ ctx.rotate(TWO_PI/4); ctx.beginPath(); ctx.ellipse(8,0,8,6,0,0,TWO_PI); ctx.fill(); }
                    ctx.fillStyle = '#f5b041'; ctx.beginPath(); ctx.arc(0,0,3,0,TWO_PI); ctx.fill();
                } else if (this.type === 'yucca') {
                    ctx.fillStyle = '#2ecc71'; ctx.fillRect(-1, -10, 2, 20);
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(-4, -5, 4, 0, PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(4, 0, 4, 0, PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(-4, 5, 4, 0, PI); ctx.fill();
                }
                ctx.restore();
            }
        }
    }
    
    const pollinator = new Pollinator();
    const garden = [];
    const fireflies = [];
    const snow = [];
    let resetTimer = null;

    for (let i = 0; i < 20; i++) garden.push(new NativeFlower());
    for (let i = 0; i < 20; i++) fireflies.push(new Firefly()); 
    for (let i = 0; i < 50; i++) snow.push(new Snowflake()); 

    function updateMouse(e) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX || e.touches[0].clientX) - rect.left;
        mouse.y = (e.clientY || e.touches[0].clientY) - rect.top;
    }
    
    canvas.addEventListener('mousemove', updateMouse);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); });

    window.addEventListener('resize', () => {
        const wrapper = document.querySelector('.game-wrapper');
        canvas.width = Math.min(wrapper.clientWidth - 40, 600); 
        horizonY = canvas.height * 0.45;
        
        grassBlades.forEach(blade => {
            blade.x = Math.random() * canvas.width;
            blade.y = horizonY + Math.random() * (canvas.height - horizonY);
        });
    });

    function advanceTimeOfDay() {
        cycle++;
        if (cycle === 1) {
            targetPalette = { ...palettes.summer };
            instructions.innerText = "The Summer sun brings out new blooms.";
        } else if (cycle === 2) {
            targetPalette = { ...palettes.fall };
            instructions.innerText = "Autumn approaches, turning the prairie gold.";
        } else if (cycle === 3) {
            targetPalette = { ...palettes.night };
            instructions.style.color = '#fcfbf9'; 
            instructions.innerText = "A Luna Moth emerges at night.";
        } else if (cycle === 4) {
            // "Thank you" phase. Still dark, flowers still visible.
            instructions.innerText = "Thank you for visiting my corner of the internet.";
        } else if (cycle === 5) {
            // Winter phase. 
            targetPalette = { ...palettes.winter };
            instructions.style.color = '#4a4a4a'; 
            instructions.innerText = "The garden rests for winter...";
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawScene();

        let bloomedCount = 0;

        if (cycle === 3 || cycle === 4) {
            fireflies.forEach(f => { f.update(); f.draw(); });
        } else if (cycle === 5) {
            snow.forEach(s => { s.update(); s.draw(); });
        }

        // Only draw flowers in seasons 0, 1, 2, 3, and 4
        if (cycle < 5) {
            garden.forEach(flower => {
                if (flower.state === 'bud' && cycle <= 3) {
                    const dist = Math.hypot(pollinator.x - flower.x, pollinator.y - flower.y);
                    if (dist < 30) flower.state = 'bloom';
                } else if (flower.state === 'bloom') {
                    bloomedCount++;
                }
                flower.draw();
            });
        }

        // Scene Transition Timers
        if (!resetTimer) {
            // Spring -> Summer -> Fall -> Night
            if (cycle <= 3 && bloomedCount === garden.length) {
                resetTimer = setTimeout(() => {
                    advanceTimeOfDay();
                    if (cycle <= 3) garden.forEach(flower => flower.reset());
                    resetTimer = null;
                }, 4000); 
            } 
            // Night -> Thank You Transition
            else if (cycle === 4) {
                resetTimer = setTimeout(() => {
                    advanceTimeOfDay(); // Move to Winter
                    resetTimer = null;
                }, 4000); // Show Thank You for 4 seconds
            } 
            // Winter -> Reset to Spring
            else if (cycle === 5) {
                resetTimer = setTimeout(() => {
                    cycle = 0;
                    targetPalette = { ...palettes.spring };
                    instructions.style.color = '#4a4a4a';
                    instructions.innerText = "Guide the bee to wake up the garden.";
                    garden.forEach(flower => flower.reset());
                    resetTimer = null;
                }, 6000); // Stay in Winter for 6 seconds
            }
        }

        // Only draw the pollinator if it's not winter
        if (cycle < 5) {
            pollinator.update();
            pollinator.draw();
        }

        requestAnimationFrame(animate);
    }

    window.dispatchEvent(new Event('resize'));
    animate();
</script>
</body>
</html>
