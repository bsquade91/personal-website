<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinator Garden | Creative Lab</title>
    <link rel="stylesheet" href="css/style.css">
<style>
    .game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 85vh;
        padding: 20px;
    }
    canvas {
        background-color: #fcfbf9; /* Default Morning */
        transition: background-color 4s ease-in-out; /* Smooth time-of-day transitions */
        border-radius: 32px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.04);
        border: 2px solid rgba(0,0,0,0.05);
        cursor: none; 
        touch-action: none; 
    }
    .instructions {
        margin-top: 1rem;
        color: #4a4a4a;
        font-size: 0.9rem;
        font-weight: bold;
        text-align: center;
        transition: color 4s ease;
    }
</style>
</head>
<body>
    <main class="game-wrapper">
        <a href="index.html" class="link" style="align-self: flex-start; margin-bottom: 1rem; max-width: 600px; width: 100%;">← Back to Portfolio</a>
        <canvas id="gardenCanvas" width="600" height="400"></canvas>
        <p class="instructions">Guide the bee to wake up the garden.</p>
    </main>

    HTML

<script>
    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d');
    const instructions = document.querySelector('.instructions');

    // Establish the horizon line at 40% down the canvas
    const horizonY = canvas.height * 0.4;

    const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let cycle = 0; 
    
    // --- The Landscape Engine (Layered Prairie) ---
    const grassBlades = [];
    for (let i = 0; i < 80; i++) {
        grassBlades.push({
            x: Math.random() * canvas.width,
            // Grass grows from the horizon down to the bottom
            y: horizonY + Math.random() * (canvas.height - horizonY),
            height: 15 + Math.random() * 25,
            swaySpeed: 0.001 + Math.random() * 0.001,
            swayOffset: Math.random() * Math.PI * 2
        });
    }

    // Color Palettes for Time of Day
    const palettes = {
        morning: {
            skyTop: [252, 251, 249], // Warm white
            skyBottom: [218, 235, 211], // Soft hazy green at horizon
            hillDistant: [194, 214, 188], // Lighter, hazier
            hillNear: [173, 196, 166], // Slightly darker
            field: [218, 235, 211], // Main ground color
            grass: [150, 175, 140] // Detail color
        },
        goldenHour: {
            skyTop: [255, 243, 224], // Warm orange-white
            skyBottom: [255, 224, 178], // Golden horizon
            hillDistant: [230, 206, 165], 
            hillNear: [214, 190, 147],
            field: [232, 213, 181], // Warm wheat
            grass: [194, 174, 140]
        },
        dusk: {
            skyTop: [44, 62, 80], // Deep blue
            skyBottom: [232, 126, 120], // Sunset pink/salmon at horizon
            hillDistant: [52, 73, 94], // Dark blue-grey
            hillNear: [44, 62, 80], // Darker silhouette
            field: [26, 37, 47], // Deep night ground
            grass: [44, 62, 80]
        }
    };

    let currentPalette = { ...palettes.morning };
    let targetPalette = { ...palettes.morning };

    // Helper to interpolate between two RGB arrays
    function lerpColor(current, target, speed) {
        current[0] += (target[0] - current[0]) * speed;
        current[1] += (target[1] - current[1]) * speed;
        current[2] += (target[2] - current[2]) * speed;
        return `rgb(${Math.round(current[0])}, ${Math.round(current[1])}, ${Math.round(current[2])})`;
    }

    function updateLandscapeColors() {
        const speed = 0.02;
        const colors = {};
        for (const key in currentPalette) {
            colors[key] = lerpColor(currentPalette[key], targetPalette[key], speed);
        }
        return colors;
    }

    function drawScene() {
        const colors = updateLandscapeColors();
        
        // 1. Sky Gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
        skyGrad.addColorStop(0, colors.skyTop);
        skyGrad.addColorStop(1, colors.skyBottom);
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, horizonY);

        // 2. Distant Hill (Hazier, flatter)
        ctx.fillStyle = colors.hillDistant;
        ctx.beginPath();
        ctx.moveTo(0, horizonY);
        ctx.bezierCurveTo(canvas.width * 0.5, horizonY - 30, canvas.width * 0.8, horizonY - 10, canvas.width, horizonY - 20);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        ctx.fill();

        // 3. Near Hill (Main prairie field)
        ctx.fillStyle = colors.field;
        ctx.beginPath();
        ctx.moveTo(0, horizonY + 10);
        ctx.bezierCurveTo(canvas.width * 0.2, horizonY - 5, canvas.width * 0.6, horizonY + 25, canvas.width, horizonY + 5);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        ctx.fill();

        // 4. Foreground Grass Details
        ctx.strokeStyle = colors.grass;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        grassBlades.forEach(blade => {
            const sway = Math.sin(Date.now() * blade.swaySpeed + blade.swayOffset) * 10;
            ctx.beginPath();
            // Draw from the blade's base Y position upwards
            ctx.moveTo(blade.x, blade.y);
            ctx.quadraticCurveTo(blade.x + sway / 2, blade.y - blade.height / 2, blade.x + sway, blade.y - blade.height);
            ctx.stroke();
        });
    }

    // --- The Pollinator (Bee or Luna Moth) ---
    class Pollinator {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.easing = 0.04; 
        }
        update() {
            this.x += (mouse.x - this.x) * this.easing;
            this.y += (mouse.y - this.y) * this.easing;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            const dx = mouse.x - this.x;
            ctx.rotate(dx * 0.005);

            if (cycle < 2) {
                // Bee
                ctx.fillStyle = '#feca57'; ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#3a3f3a'; ctx.fillRect(-2, -8, 4, 16);
                const flap = Math.sin(Date.now() * 0.05) * 3;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath(); ctx.ellipse(-2, -8, 4, 6 + flap, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(2, -8, 4, 6 + flap, -Math.PI / 4, 0, Math.PI * 2); ctx.fill();
            } else {
                // Luna Moth
                const flap = Math.sin(Date.now() * 0.03) * 5; 
                ctx.fillStyle = '#fdfcf0'; ctx.beginPath(); ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(186, 220, 88, 0.85)'; 
                ctx.beginPath(); ctx.ellipse(-8, -2, 12, 16 + flap, Math.PI / 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(8, -2, 12, 16 + flap, -Math.PI / 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-6, 10, 8, 18 - flap, -Math.PI / 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(6, 10, 8, 18 - flap, Math.PI / 8, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }
    }

    // --- Ambient Fireflies (Night Only) ---
    class Firefly {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.offset = Math.random() * 100;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            const glow = (Math.sin(Date.now() * 0.002 + this.offset) + 1) / 2;
            ctx.fillStyle = `rgba(241, 196, 15, ${glow * 0.8})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2 + glow * 2, 0, Math.PI * 2); ctx.fill();
        }
    }

    // --- The Native Flora ---
    class NativeFlower {
        constructor() { this.reset(); }
        reset() {
            this.x = 20 + Math.random() * (canvas.width - 40);
            // **FIXED PLACEMENT:** Only spawn below the horizon line with a buffer
            this.y = horizonY + 20 + Math.random() * (canvas.height - horizonY - 40);
            this.state = 'bud';
            this.bloomScale = 0;
            const species = ['susan', 'coneflower', 'aster'];
            this.type = species[Math.floor(Math.random() * species.length)];
        }
        draw() {
            // Colors updated to match the new palettes
            let budColor, petalColor, centerColor;
            if (cycle === 0) { budColor='#badc58'; petalColor={susan:'#f1c40f',cone:'#D980FA',aster:'#9b59b6'}; centerColor='#2d3436'; }
            else if (cycle === 1) { budColor='#c0b869'; petalColor={susan:'#e1b12c',cone:'#c27ba0',aster:'#8e44ad'}; centerColor='#4a3f35'; }
            else { budColor='#5f6e46'; petalColor={susan:'#b08f0a',cone:'#8e54a3',aster:'#643975'}; centerColor='#1a1a2e'; }

            if (this.state === 'bud') {
                ctx.fillStyle = budColor;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
            } else if (this.state === 'bloom') {
                if (this.bloomScale < 1) this.bloomScale += 0.03;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.bloomScale, this.bloomScale);

                if (this.type === 'susan') {
                    ctx.fillStyle = petalColor.susan;
                    for (let i=0; i<12; i++) { ctx.rotate((Math.PI*2)/12); ctx.beginPath(); ctx.ellipse(10,0,8,3,0,0,Math.PI*2); ctx.fill(); }
                    ctx.fillStyle = centerColor; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
                } else if (this.type === 'coneflower') {
                    ctx.fillStyle = petalColor.cone;
                    for (let i=0; i<10; i++) { ctx.rotate((Math.PI*2)/10); ctx.beginPath(); ctx.ellipse(12,4,10,3,Math.PI/8,0,Math.PI*2); ctx.fill(); }
                    ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
                } else if (this.type === 'aster') {
                    ctx.fillStyle = petalColor.aster;
                    for (let i=0; i<20; i++) { ctx.rotate((Math.PI*2)/20); ctx.beginPath(); ctx.ellipse(10,0,9,2,0,0,Math.PI*2); ctx.fill(); }
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }
    }

    // --- Game Initialization & Loop ---
    const pollinator = new Pollinator();
    const garden = [];
    const fireflies = [];
    let resetTimer = null;

    for (let i = 0; i < 20; i++) garden.push(new NativeFlower());
    for (let i = 0; i < 15; i++) fireflies.push(new Firefly()); 

    function updateMouse(e) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX || e.touches[0].clientX) - rect.left;
        mouse.y = (e.clientY || e.touches[0].clientY) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); });

    function advanceTimeOfDay() {
        cycle++;
        if (cycle === 1) {
            targetPalette = { ...palettes.goldenHour };
            instructions.innerText = "The afternoon sun brings out new blooms.";
            // Removed canvas.style.backgroundColor change as it's now handled by drawScene()
        } else if (cycle === 2) {
            targetPalette = { ...palettes.dusk };
            instructions.style.color = '#fcfbf9'; 
            instructions.innerText = "The Luna Moth takes the night shift.";
        } else if (cycle > 2) {
            instructions.innerText = "The ecosystem is at rest. Thanks for visiting.";
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. Draw the new layered background
        drawScene();

        let bloomedCount = 0;

        // 2. Draw Fireflies (Night Only)
        if (cycle >= 2) {
            fireflies.forEach(f => { f.update(); f.draw(); });
        }

        // 3. Draw Garden (Now correctly placed below horizon)
        garden.forEach(flower => {
            if (flower.state === 'bud' && cycle <= 2) {
                const dist = Math.hypot(pollinator.x - flower.x, pollinator.y - flower.y);
                if (dist < 30) flower.state = 'bloom';
            } else if (flower.state === 'bloom') {
                bloomedCount++;
            }
            flower.draw();
        });

        // Time Progression Logic
        if (bloomedCount === garden.length && !resetTimer && cycle <= 2) {
            resetTimer = setTimeout(() => {
                advanceTimeOfDay();
                if (cycle <= 2) {
                    garden.forEach(flower => flower.reset());
                }
                resetTimer = null;
            }, 5000); 
        }

        // 4. Draw Pollinator on top
        pollinator.update();
        pollinator.draw();

        requestAnimationFrame(animate);
    }

    animate();
</script>
