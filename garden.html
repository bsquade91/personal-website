<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinator Garden | Creative Lab</title>
    <link rel="stylesheet" href="css/style.css">
<style>
    .game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 85vh;
        padding: 20px;
    }
    canvas {
        background-color: #fcfbf9; /* Default Morning */
        transition: background-color 4s ease-in-out; /* Smooth time-of-day transitions */
        border-radius: 32px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.04);
        border: 2px solid rgba(0,0,0,0.05);
        cursor: none; 
        touch-action: none; 
    }
    .instructions {
        margin-top: 1rem;
        color: #4a4a4a;
        font-size: 0.9rem;
        font-weight: bold;
        text-align: center;
        transition: color 4s ease;
    }
</style>
</head>
<body>
    <main class="game-wrapper">
        <a href="index.html" class="link" style="align-self: flex-start; margin-bottom: 1rem; max-width: 600px; width: 100%;">← Back to Portfolio</a>
        <canvas id="gardenCanvas" width="600" height="400"></canvas>
        <p class="instructions">Guide the bee to wake up the garden.</p>
    </main>

    <script>
    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d');
    const instructions = document.querySelector('.instructions');

    const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let cycle = 0; // Tracks the time of day
    
    // --- The Pollinator (Bee or Luna Moth) ---
    class Pollinator {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.easing = 0.04; 
        }

        update() {
            this.x += (mouse.x - this.x) * this.easing;
            this.y += (mouse.y - this.y) * this.easing;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            const dx = mouse.x - this.x;
            ctx.rotate(dx * 0.005);

            if (cycle < 2) {
                // Draw Bee (Morning / Golden Hour)
                ctx.fillStyle = '#feca57'; 
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#3a3f3a';
                ctx.fillRect(-2, -8, 4, 16);
                const flap = Math.sin(Date.now() * 0.05) * 3;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.ellipse(-2, -8, 4, 6 + flap, Math.PI / 4, 0, Math.PI * 2);
                ctx.ellipse(2, -8, 4, 6 + flap, -Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Draw Luna Moth (Dusk/Night)
                const flap = Math.sin(Date.now() * 0.03) * 5; // Slower, elegant flap
                ctx.fillStyle = '#fdfcf0'; // Fluffy white body
                ctx.beginPath();
                ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                // Pale green wings
                ctx.fillStyle = 'rgba(186, 220, 88, 0.85)'; 
                ctx.beginPath();
                ctx.ellipse(-8, -2, 12, 16 + flap, Math.PI / 6, 0, Math.PI * 2); // Left top
                ctx.ellipse(8, -2, 12, 16 + flap, -Math.PI / 6, 0, Math.PI * 2); // Right top
                ctx.ellipse(-6, 10, 8, 18 - flap, -Math.PI / 8, 0, Math.PI * 2); // Left tail
                ctx.ellipse(6, 10, 8, 18 - flap, Math.PI / 8, 0, Math.PI * 2); // Right tail
                ctx.fill();
            }
            ctx.restore();
        }
    }

    // --- Ambient Fireflies (Night Only) ---
    class Firefly {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.offset = Math.random() * 100;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            // Pulsing glow effect
            const glow = (Math.sin(Date.now() * 0.002 + this.offset) + 1) / 2;
            ctx.fillStyle = `rgba(241, 196, 15, ${glow * 0.8})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2 + glow * 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // --- The Native Flora ---
    class NativeFlower {
        constructor() { this.reset(); }
        reset() {
            this.x = 30 + Math.random() * (canvas.width - 60);
            this.y = 30 + Math.random() * (canvas.height - 60);
            this.state = 'bud';
            this.bloomScale = 0;
            const species = ['susan', 'coneflower', 'aster'];
            this.type = species[Math.floor(Math.random() * species.length)];
        }
        draw() {
            if (this.state === 'bud') {
                // At night, buds are slightly darker
                ctx.fillStyle = cycle < 2 ? '#badc58' : '#718055';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (this.state === 'bloom') {
                if (this.bloomScale < 1) this.bloomScale += 0.03;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.bloomScale, this.bloomScale);

                if (this.type === 'susan') {
                    ctx.fillStyle = cycle < 2 ? '#f1c40f' : '#d4ac0d'; // Dims slightly at night
                    for (let i = 0; i < 12; i++) {
                        ctx.rotate((Math.PI * 2) / 12);
                        ctx.beginPath();
                        ctx.ellipse(10, 0, 8, 3, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#2d3436';
                    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
                } 
                else if (this.type === 'coneflower') {
                    ctx.fillStyle = cycle < 2 ? '#D980FA' : '#a262bd';
                    for (let i = 0; i < 10; i++) {
                        ctx.rotate((Math.PI * 2) / 10);
                        ctx.beginPath();
                        ctx.ellipse(12, 4, 10, 3, Math.PI / 8, 0, Math.PI * 2); 
                        ctx.fill();
                    }
                    ctx.fillStyle = '#e67e22';
                    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
                } 
                else if (this.type === 'aster') {
                    ctx.fillStyle = cycle < 2 ? '#9b59b6' : '#734287';
                    for (let i = 0; i < 20; i++) {
                        ctx.rotate((Math.PI * 2) / 20);
                        ctx.beginPath();
                        ctx.ellipse(10, 0, 9, 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }
    }

    // --- Game Initialization & Loop ---
    const pollinator = new Pollinator();
    const garden = [];
    const fireflies = [];
    let resetTimer = null;

    for (let i = 0; i < 20; i++) garden.push(new NativeFlower());
    for (let i = 0; i < 15; i++) fireflies.push(new Firefly()); // Spawn fireflies

    function updateMouse(e) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX || e.touches[0].clientX) - rect.left;
        mouse.y = (e.clientY || e.touches[0].clientY) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateMouse(e); });

    function advanceTimeOfDay() {
        cycle++;
        if (cycle === 1) {
            canvas.style.backgroundColor = '#fff3e0'; // Golden Hour
            instructions.innerText = "The afternoon sun brings out new blooms.";
        } else if (cycle === 2) {
            canvas.style.backgroundColor = '#2c3e50'; // Dusk
            instructions.style.color = '#fcfbf9'; // Make text readable on dark bg
            instructions.innerText = "The Luna Moth takes the night shift.";
        } else if (cycle > 2) {
            // Final state achieved. No more resets.
            instructions.innerText = "The ecosystem is at rest. Thanks for visiting.";
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let bloomedCount = 0;

        // Draw Fireflies if it's dusk
        if (cycle >= 2) {
            fireflies.forEach(f => { f.update(); f.draw(); });
        }

        garden.forEach(flower => {
            if (flower.state === 'bud' && cycle <= 2) {
                const dist = Math.hypot(pollinator.x - flower.x, pollinator.y - flower.y);
                if (dist < 30) flower.state = 'bloom';
            } else if (flower.state === 'bloom') {
                bloomedCount++;
            }
            flower.draw();
        });

        // The Time Progression Logic
        if (bloomedCount === garden.length && !resetTimer && cycle <= 2) {
            resetTimer = setTimeout(() => {
                advanceTimeOfDay();
                if (cycle <= 2) {
                    garden.forEach(flower => flower.reset());
                }
                resetTimer = null;
            }, 5000); // 5 seconds to admire before time advances
        }

        pollinator.update();
        pollinator.draw();

        requestAnimationFrame(animate);
    }

    animate();
</script>
